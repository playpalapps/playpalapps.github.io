<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px; overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #FAFBFF;
      position: relative;
    }

    /* Soft gradient orbs */
    .orb1 {
      position: absolute; width: 720px; height: 720px; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 65%);
      top: -220px; right: -120px;
    }
    .orb2 {
      position: absolute; width: 520px; height: 520px; border-radius: 50%;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 65%);
      bottom: -160px; left: -120px;
    }

    /* Left accent bar */
    .accent-bar {
      position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
      background: linear-gradient(180deg, #6366F1, #7C3AED, #EC4899);
    }

    /* Main layout */
    .layout {
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: space-between;
      height: 100%; padding: 56px 80px 56px 86px;
    }

    /* Left side */
    .left { flex: 1; padding-right: 60px; max-width: 720px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px 6px 10px;
      background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(6,182,212,0.07));
      border: 1px solid rgba(16,185,129,0.25); border-radius: 100px;
      font-size: 13px; font-weight: 700; color: #047857;
      margin-bottom: 22px;
    }
    .badge-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #10B981; box-shadow: 0 0 0 3px rgba(16,185,129,0.25);
    }

    .name {
      font-size: 92px; font-weight: 900; line-height: 0.92;
      letter-spacing: -5px; color: #0F172A;
      margin-bottom: 18px; padding-bottom: 12px;
    }
    .name .grad {
      display: block;
      background: linear-gradient(135deg, #6366F1 0%, #7C3AED 45%, #EC4899 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .role {
      font-size: 16px; font-weight: 600; color: #64748B;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px; flex-wrap: wrap;
    }
    .role-sep { width: 4px; height: 4px; border-radius: 50%; background: #CBD5E1; flex-shrink: 0; }
    .role b {
      background: linear-gradient(135deg, #1E40AF, #4F46E5, #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-weight: 800;
    }

    /* Worked-with logos strip */
    .worked-with {
      display: flex; align-items: center; gap: 28px;
    }
    .ww-label {
      font-size: 10px; font-weight: 800; letter-spacing: 2.4px;
      text-transform: uppercase; color: #94A3B8;
      padding-right: 18px; border-right: 1px solid #E2E8F0;
    }
    .logo-row {
      display: flex; align-items: center; gap: 36px;
    }
    .logo-row img {
      object-fit: contain; filter: grayscale(1); opacity: 0.55;
    }
    .logo-row img:nth-child(1) { height: 44px; }   /* block */
    .logo-row img:nth-child(2) { height: 56px; }   /* afterpay */
    .logo-row img:nth-child(3) { height: 24px; }   /* ubank */
    .logo-row img:nth-child(4) { height: 24px; }   /* infosys */

    /* Right — stylized portrait */
    .right { flex-shrink: 0; position: relative; width: 360px; height: 100%; display: flex; align-items: center; justify-content: center; }
    .portrait { width: 360px; height: 360px; }
    .portrait img { width: 100%; height: 100%; object-fit: contain; opacity: 0.18; }

    /* Bottom URL stamp */
    .url-stamp {
      position: absolute; bottom: 24px; right: 80px;
      font-size: 13px; font-weight: 700; color: #94A3B8;
      letter-spacing: 0.5px; z-index: 3;
    }
    .url-stamp span {
      background: linear-gradient(135deg, #6366F1, #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="accent-bar"></div>

  <div class="layout">
    <div class="left">
      <div class="badge"><span class="badge-dot"></span> Sydney, Australia</div>
      <h1 class="name">Naveen<span class="grad">Raj</span></h1>
      <p class="role">Senior QA Lead <span class="role-sep"></span> Indie App Builder <span class="role-sep"></span> Founder, <b>Playpal Apps</b></p>
      <div class="worked-with">
        <span class="ww-label">Worked with</span>
        <div class="logo-row">
          <img src="assets/block.png" alt="Block">
          <img src="assets/afterpay.png" alt="Afterpay">
          <img src="assets/ubank.svg" alt="UBank">
          <img src="assets/infosys.png" alt="Infosys">
        </div>
      </div>
    </div>
    <div class="right">
      <div class="portrait"><img src="assets/naveen-portrait.png" alt=""></div>
    </div>
  </div>
  <div class="url-stamp">playpalapps.github.io/<span>naveen-raj</span></div>
</body>
</html>
