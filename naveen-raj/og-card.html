<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px; overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #FAFBFF;
      position: relative;
    }

    /* Dot grid */
    .dots {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(99,102,241,0.15) 1.5px, transparent 1.5px);
      background-size: 36px 36px;
      mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 20%, transparent 100%);
    }

    /* Gradient orbs */
    .orb1 {
      position: absolute; width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.13) 0%, transparent 65%);
      top: -200px; right: -100px;
    }
    .orb2 {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 65%);
      bottom: -150px; left: -100px;
    }

    /* Left accent bar */
    .accent-bar {
      position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
      background: linear-gradient(180deg, #6366F1, #7C3AED, #EC4899);
    }

    /* Main layout */
    .layout {
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: space-between;
      height: 100%; padding: 60px 80px 60px 86px;
    }

    /* Left side */
    .left { flex: 1; padding-right: 60px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px 6px 10px;
      background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(6,182,212,0.07));
      border: 1px solid rgba(16,185,129,0.25); border-radius: 100px;
      font-size: 13px; font-weight: 700; color: #047857;
      margin-bottom: 24px;
    }
    .badge-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #10B981; box-shadow: 0 0 0 3px rgba(16,185,129,0.25);
    }

    .name {
      font-size: 88px; font-weight: 900; line-height: 0.92;
      letter-spacing: -5px; color: #0F172A;
      margin-bottom: 18px; padding-bottom: 10px;
    }
    .name .grad {
      display: block;
      background: linear-gradient(135deg, #6366F1 0%, #7C3AED 45%, #EC4899 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .role {
      font-size: 17px; font-weight: 600; color: #64748B;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 36px;
    }
    .role-sep { width: 4px; height: 4px; border-radius: 50%; background: #CBD5E1; }

    /* Stats row */
    .stats { display: flex; gap: 0; border-radius: 16px; overflow: hidden; border: 1px solid #E2E8F0; background: #E2E8F0; width: fit-content; }
    .stat {
      background: white; padding: 16px 28px; text-align: center;
      border-right: 1px solid #E2E8F0;
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-size: 30px; font-weight: 900; letter-spacing: -2px; line-height: 1;
      background: linear-gradient(135deg, #6366F1, #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label { font-size: 10px; color: #94A3B8; font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

    /* Right — photo */
    .right { flex-shrink: 0; position: relative; }
    .photo-wrap { position: relative; width: 260px; height: 260px; }
    .photo-ring {
      position: absolute; inset: -7px; border-radius: 50%;
      background: conic-gradient(from 0deg, #6366F1, #7C3AED, #EC4899, #06B6D4, #10B981, #6366F1);
    }
    .photo-gap {
      position: absolute; inset: -2px; border-radius: 50%; background: #FAFBFF;
      z-index: 1;
    }
    .photo-glow {
      position: absolute; inset: -30px; border-radius: 50%; z-index: 0;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
    }
    .photo-wrap img {
      width: 260px; height: 260px; border-radius: 50%;
      object-fit: cover; object-position: center top;
      position: relative; z-index: 2; display: block;
    }

    /* Bottom URL stamp */
    .url-stamp {
      position: absolute; bottom: 28px; right: 80px;
      font-size: 13px; font-weight: 700; color: #94A3B8;
      letter-spacing: 0.5px; z-index: 3;
    }
    .url-stamp span {
      background: linear-gradient(135deg, #6366F1, #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="dots"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="accent-bar"></div>

  <div class="layout">
    <div class="left">
      <div class="badge"><span class="badge-dot"></span> Block · Cash App · Sydney</div>
      <h1 class="name">Naveen<span class="grad">Raj</span></h1>
      <p class="role">Senior QA Lead <span class="role-sep"></span> Indie App Builder</p>
      <div class="stats">
        <div class="stat"><div class="stat-num">10+</div><div class="stat-label">Years Exp</div></div>
        <div class="stat"><div class="stat-num">10</div><div class="stat-label">Apps Shipped</div></div>
        <div class="stat"><div class="stat-num">4</div><div class="stat-label">Companies</div></div>
      </div>
    </div>
    <div class="right">
      <div class="photo-wrap">
        <div class="photo-glow"></div>
        <div class="photo-ring"></div>
        <div class="photo-gap"></div>
        <img src="naveen.png" alt="Naveen Raj">
      </div>
    </div>
  </div>
  <div class="url-stamp">playpalapps.github.io/<span>naveen-raj</span></div>
</body>
</html>
